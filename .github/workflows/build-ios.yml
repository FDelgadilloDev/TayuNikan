name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ios:
    name: Build unsigned IPA
    runs-on: macos-latest

    steps:
      # 1. Descargar código
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Instalar Flutter
      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      # 3. Dependencias Dart
      - name: flutter pub get
        run: flutter pub get

      # 4. Instalar CocoaPods (requerido antes del build iOS)
      - name: pod install
        run: |
          cd ios
          pod install --repo-update
        env:
          LANG: en_US.UTF-8

      # 5. Build iOS sin firma
      - name: flutter build ios --no-codesign
        run: flutter build ios --release --no-codesign
        env:
          LANG: en_US.UTF-8

      # 6. Empaquetar como IPA
      - name: Crear IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r TayuNikan-unsigned.ipa Payload/
          ls -lh TayuNikan-unsigned.ipa

      # 7. Subir artefacto (disponible 30 días)
      - name: Subir IPA
        uses: actions/upload-artifact@v4
        with:
          name: TayuNikan-iOS-unsigned
          path: build/ios/iphoneos/TayuNikan-unsigned.ipa
          retention-days: 30

      # 8. Resumen
      - name: Resumen
        run: |
          echo "## ✅ IPA listo para descargar" >> $GITHUB_STEP_SUMMARY
          echo "Descarga el artefacto **TayuNikan-iOS-unsigned** e instálalo con Sideloadly en tu iPad." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          ls -lh build/ios/iphoneos/TayuNikan-unsigned.ipa >> $GITHUB_STEP_SUMMARY
